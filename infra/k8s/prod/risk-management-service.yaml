apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-management-service
  namespace: algosaas
  labels:
    app: risk-management-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-management-service
  template:
    metadata:
      labels:
        app: risk-management-service
    spec:
      containers:
        - name: risk-management-service
          image: ghcr.io/algosaas/risk-management-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: algosaas-config
            - secretRef:
                name: algosaas-secrets
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: risk-management-service
  namespace: algosaas
spec:
  selector:
    app: risk-management-service
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: risk-management-service
  namespace: algosaas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: risk-management-service
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
