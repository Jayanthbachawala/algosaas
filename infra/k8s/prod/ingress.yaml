apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: algosaas-ingress
  namespace: algosaas
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/limit-rps: "50"
spec:
  tls:
    - hosts:
        - api.algosaas.com
        - app.algosaas.com
        - admin.algosaas.com
        - www.algosaas.com
      secretName: algosaas-tls
  rules:
    - host: api.algosaas.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
    - host: app.algosaas.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-frontend
                port:
                  number: 80
    - host: admin.algosaas.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-frontend
                port:
                  number: 80
    - host: www.algosaas.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: marketing-frontend
                port:
                  number: 80
