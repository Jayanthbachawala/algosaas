apiVersion: v1
kind: Service
metadata:
  name: postgres-ha
  namespace: algosaas
spec:
  type: ExternalName
  externalName: algosaas-postgres-rw.db.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: algosaas
spec:
  type: ExternalName
  externalName: algosaas-redis-master.cache.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-cluster
  namespace: algosaas
spec:
  type: ExternalName
  externalName: algosaas-kafka.kafka.svc.cluster.local
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: algosaas
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16
              envFrom:
                - secretRef:
                    name: algosaas-secrets
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: algosaas-secrets
                      key: POSTGRES_PASSWORD
              command:
                - /bin/sh
                - -c
                - |
                  pg_dump -h ${POSTGRES_HOST} -U ${POSTGRES_USER} ${POSTGRES_DB} | gzip > /backup/algosaas-$(date +%F).sql.gz
              volumeMounts:
                - name: backup-vol
                  mountPath: /backup
          volumes:
            - name: backup-vol
              persistentVolumeClaim:
                claimName: postgres-backup-pvc
