apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-frontend
  namespace: algosaas
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dashboard-frontend
  template:
    metadata:
      labels:
        app: dashboard-frontend
    spec:
      containers:
        - name: dashboard-frontend
          image: ghcr.io/algosaas/dashboard-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-frontend
  namespace: algosaas
spec:
  selector:
    app: dashboard-frontend
  ports:
    - port: 80
      targetPort: 80
---
