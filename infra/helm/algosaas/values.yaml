global:
  postgresHost: algosaas-postgres-rw.db.svc.cluster.local
  postgresPort: "5432"
  postgresDb: algosaas
  redisUrl: redis://algosaas-redis-master.cache.svc.cluster.local:6379/0
  kafkaBootstrapServers: algosaas-kafka.kafka.svc.cluster.local:9092

secrets:
  postgresUser: algosaas
  postgresPassword: change-me
  jwtSecret: change-me

ingress:
  apiHost: api.algosaas.com

services:
  api-gateway:
    enabled: true
    image: ghcr.io/algosaas/api-gateway:latest
    port: 8000
    replicas: 3
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 20
      cpuUtilization: 60
      memoryUtilization: 70
  user-service:
    enabled: true
    image: ghcr.io/algosaas/user-service:latest
    port: 8000
    replicas: 2
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 8
      cpuUtilization: 70
      memoryUtilization: 75
